name: CI/CD ololeo-admin

on: 
  push:
    branches:
      - main

# deploy to docker hub first
jobs:
    docker-build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: nitaaa21
                password: dnT4b1j4R*D0k3r
            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                context: .
                push: true
                tags: nitaaa21/ololeo-bucket:ololeo-marketplace-latest
    
    deploy-prod: # deploy with appleboy
        runs-on: ubuntu-latest
        needs: docker-build
        environment: production
        steps:
            - uses: appleboy/ssh-action@v1.0.3
              with:
                host: 43.157.229.127
                username: ubuntu
                key: ${{ secrets.SSH_KEY }}
                port: 3467
                script: |
                    cd ~/app/zanfuu/ololeo-store
                    bash marketplace-redeploy.sh
        
