name: CI/CD Ololeo Bucket Website

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Perbaikan utama: Menggunakan Node 22 agar tidak error saat build
      - name: Use Node.js 22.x
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build the application
        run: npm run build

      # Login ke Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: nitaaa21
          password: dnT4b1j4R*D0k3r

      # Build dan Push Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: nitaaa21/ololeo-bucket:frontend

      # Update ke VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: 43.133.134.181
          username: ubuntu
          password: "matrix-29#-thunder"
          port: 22
          script: |
            cd ~/app/nitaaa
            bash ololeo-store.sh
